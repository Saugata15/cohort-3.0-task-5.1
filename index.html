<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="watermark">SQUID</div>

    <header>
        <div class="logo">
            <img src="./images/logo.png" alt="logo">
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="#">About</a></li>
                <li class="active"><a href="#">Watch now</a></li>
                <li><a href="#">Actors</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>

        <i class="ri-menu-line"></i>
    </header>

    <main class="hero">
        <div class="hero-heading">
            <img src="./images/logo.png" alt="logo">
        </div>
        <p>Action / Thriller / Drama Series directed by Dong-hyuk Hwang</p>
        <p>Season 1: 9 Episodes</p>
        <div class="hero-btn">
            <a class="btn btn-primary" href="#"><i class="ri-play-circle-fill"></i> Play Now</a>
            <a class="btn btn-outline" href="#"><i class="ri-play-large-line"></i> Watch Trailer</a>
        </div>
        <div class="scroll-indicator">
            <span class="txt">SCROLL</span>
            <div class="line"></div>
        </div>
        <div class="hero-char-image">
            <img src="./images/man.png" alt="man-image">
        </div>

        <div class="game">GAME</div>

        <div class="socials">
            <span><i class="ri-twitter-line"></i></span>
            <span><i class="ri-instagram-line"></i></span>
            <span><i class="ri-facebook-fill"></i></span>
        </div>
    </main>

    <section class="clips">
        <article class="card">
            <div class="card-image">
                <img src="./images/card-1.jpg" alt="image">
            </div>
            <div class="play-btn"><i class="ri-play-large-fill"></i></div>
        </article>

        <article class="card">
            <div class="card-image">
                <img src="./images/card-2.jpg" alt="image">
            </div>
            <div class="play-btn"><i class="ri-play-large-fill"></i></div>
        </article>

        <article class="card">
            <div class="card-image">
                <img src="./images/card-3.jpg" alt="image">
            </div>
            <div class="play-btn"><i class="ri-play-large-fill"></i></div>
        </article>
    </section>
</body>

</html>
